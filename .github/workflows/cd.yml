name: CD - Build and Distribute Android (After Merge)

on:
  workflow_run:
    workflows: ["Build Check"] # ⬅️ اسم الـ CI الأول بالضبط
    types:
      - completed
  workflow_dispatch:

jobs:
  build-and-distribute:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.event == 'pull_request' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            thread_ts: ${{ secrets.SLACK_MASTER_THREAD_TS }}
            text: |
              :rocket: Workflow *Build Check* succeeded on `${{ github.event.workflow_run.head_branch }}`.
              Starting Android release build...
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Build release APK
        run: flutter build apk --release --target-platform android-arm64 -t lib/ui/main/main.dart

      - name: Upload APK to latest Slack thread
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: files.uploadV2
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel_id: ${{ secrets.SLACK_CHANNEL_ID }}
            initial_comment: ":white_check_mark: Build successful for commit `${{ github.event.workflow_run.head_sha }}` on `${{ github.event.workflow_run.head_branch }}`."
            file: "build/app/outputs/flutter-apk/app-release.apk"
            filename: "sellio-${{ github.event.workflow_run.head_sha }}.apk"
            thread_ts: ${{ secrets.SLACK_MASTER_THREAD_TS }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

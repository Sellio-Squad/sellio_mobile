name: CD - Build and Distribute Android (After Merge)

on:
  pull_request:
    types: [closed]
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  build-and-distribute:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Notify Slack
        id: slack
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          message: |
            Pull Request *${{ github.event_name == 'pull_request' && github.event.pull_request.title || 'Manual Trigger' }}* merged into `${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}`.
            Starting Android build...
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Build release APK
        run: flutter build apk --release -t lib/ui/main/main.dart

      - name: Upload APK to Slack
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          file: build/app/outputs/flutter-apk/app-release.apk
          initial_comment: 'Build successful! The new APK is ready.'
          thread_ts: ${{ steps.slack.outputs.ts }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

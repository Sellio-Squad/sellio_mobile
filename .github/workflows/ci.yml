name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    types: [opened, closed, reopened, synchronize]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

  autoupdate:
    # Run on push to 'develop' OR pull_request events
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request'

    name: Auto Update
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      repository-projects: write

    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Configure Git
        run: |
          git config --global user.name "Sellio Bot"
          git config --global user.email "240505093+sellio-bot[bot]@users.noreply.github.com"

      - uses: chinthakagodawita/autoupdate@v1.7.0
        id: autoupdate
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          DRY_RUN: "false"
          PR_FILTER: "protected"
          MERGE_MSG: "Branch was auto-updated."
          RETRY_COUNT: "5"
          RETRY_SLEEP: "300"
          MERGE_CONFLICT_ACTION: "ignore"

      - run: echo 'Merge conflicts found!'
        if: ${{ steps.autoupdate.outputs.conflicted }}

      - run: echo 'No merge conflicts'
        if: ${{ !steps.autoupdate.outputs.conflicted }}

      - name: Find Autoupdate PR Comment
        if: always() && github.event.pull_request.number
        uses: peter-evans/find-comment@v3
        id: fc_autoupdate
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'sellio-bot[bot]'
          body-includes: '<!-- sellio-bot-autoupdate-comment -->'

      - name: Add or Update PR comment for Autoupdate
        if: always() && github.event.pull_request.number
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.fc_autoupdate.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- sellio-bot-autoupdate-comment -->
            **[Sellio Bot] Auto-update Status**

            ${{ steps.autoupdate.outputs.conflicted == 'true' && '❌ **Merge conflict detected!** Branch could not be automatically updated from `develop`.' || '' }}
            ${{ steps.autoupdate.outputs.conflicted != 'true' && steps.autoupdate.outcome == 'success' && '✅ Branch successfully updated from `develop`.' || '' }}
            ${{ steps.autoupdate.outcome == 'failure' && '🚨 An error occurred during the auto-update process.' || '' }}
name: Auto Update PR

on:
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  autoupdate:
    name: Auto Update
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      repository-projects: write

    steps:
      - name: Debug Secrets Access
        run: |
          if [ -z "${{ secrets.APP_ID }}" ]; then
            echo "::error::APP_ID secret is empty! The workflow cannot access the organization secret."
            exit 1
          else
            echo "APP_ID secret is present."
          fi
          if [ -z "${{ secrets.APP_PRIVATE_KEY }}" ]; then
            echo "::error::APP_PRIVATE_KEY secret is empty! The workflow cannot access the organization secret."
            exit 1
          else
            echo "APP_PRIVATE_KEY secret is present."
          fi

      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Configure Git
        run: |
          git config --global user.name "Sellio Bot"
          git config --global user.email "2189264+sellio-bot[bot]@users.noreply.github.com"

      - uses: chinthakagodawita/autoupdate@v1.7.0
        id: autoupdate
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          DRY_RUN: "false"
          PR_FILTER: "protected"
          MERGE_MSG: "Branch was auto-updated."
          RETRY_COUNT: "5"
          RETRY_SLEEP: "300"
          MERGE_CONFLICT_ACTION: "ignore"

      - run: echo 'Merge conflicts found!'
        if: ${{ steps.autoupdate.outputs.conflicted }}

      - run: echo 'No merge conflicts'
        if: ${{ !steps.autoupdate.outputs.conflicted }}

      - name: Find Autoupdate PR Comment
        if: always() && github.event.pull_request.number && steps.app-token.outcome == 'success'
        uses: peter-evans/find-comment@v3
        id: fc_autoupdate
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'sellio-bot[bot]'
          body-includes: '<!-- sellio-bot-autoupdate-comment -->'

      - name: Add or Update PR comment for Autoupdate
        if: always() && github.event.pull_request.number && steps.app-token.outcome == 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.fc_autoupdate.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- sellio-bot-autoupdate-comment -->
            **[Sellio Bot] Auto-update Status**

            ${{ steps.autoupdate.outputs.conflicted == 'true' && '❌ **Merge conflict detected!** Branch could not be automatically updated from `develop`.' || '' }}
            ${{ steps.autoupdate.outputs.conflicted != 'true' && steps.autoupdate.outcome == 'success' && '✅ Branch successfully updated from `develop`.' || '' }}
            ${{ steps.autoupdate.outcome == 'failure' && '🚨 An error occurred during the auto-update process.' || '' }}

name: seller
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  design_system:
    path: ../../packages/design_system

  core:
    path: ../../packages/core

  authentication:
    path: ../../packages/authentication

  # UI Dependencies
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  flutter_gap: ^1.0.2
  intl: ^0.20.0
  shimmer: ^3.0.0

  # Networking
  dio: ^5.7.0

  # Dependency Injection
  get_it: ^7.7.0

  # Local Storage
  shared_preferences: ^2.2.3

  # Network Info
  internet_connection_checker: ^1.0.0+1

  # Navigation
  go_router: ^16.3.0

  equatable: ^2.0.7

  # State Management
  flutter_bloc: ^8.1.2

  # Country Picker
  country_picker: ^2.0.27
  country_detector: ^1.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
